{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Logistics Optimizer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

    <nav>
        <a href="{% url 'interface:index' %}" class="nav-logo">⬡ LogiOpt</a>
        <a href="{% url 'interface:index' %}" {% if request.resolver_match.url_name == 'index' %}class="active"{% endif %}>Accueil</a>
        <a href="{% url 'interface:scenarios' %}" {% if request.resolver_match.url_name == 'scenarios' %}class="active"{% endif %}>Scénarios</a>
        <a href="{% url 'interface:comparaison' %}" {% if request.resolver_match.url_name == 'comparaison' %}class="active"{% endif %}>Comparaison</a>
        <a href="{% url 'interface:historique' %}" {% if request.resolver_match.url_name == 'historique' %}class="active"{% endif %}>Historique</a>
        <div class="nav-spacer"></div>
        <span class="nav-badge">L3 Informatique</span>
        <button class="theme-toggle" id="themeToggle" title="Basculer thème sombre/clair" aria-label="Basculer thème">
            <span class="theme-toggle-icon">
                <!-- Sun -->
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <!-- Moon -->
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </span>
        </button>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Projet L3 Informatique — Optimisation logistique numérique</p>
    </footer>

    {% block extra_js %}{% endblock %}

    <script>
        (function() {
            const btn = document.getElementById('themeToggle');
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

            btn.addEventListener('click', function() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();
    </script>

</body>
</html>
